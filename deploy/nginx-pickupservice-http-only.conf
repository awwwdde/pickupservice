# Временный конфиг ДО выпуска Let's Encrypt: только HTTP :80
# После certbot замените на nginx-pickupservice.conf

upstream pickupservice_django {
    server unix:/run/gunicorn/pickupservice.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name pickupservice.moscow www.pickupservice.moscow;

    client_max_body_size 25M;

    root /var/www/pickupservice/dist;
    index index.html;

    location /static/ {
        alias /var/www/pickupservice/server/static/;
        expires 30d;
    }

    location /media/ {
        alias /var/www/pickupservice/server/media/;
        expires 7d;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://pickupservice_django;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://pickupservice_django;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
