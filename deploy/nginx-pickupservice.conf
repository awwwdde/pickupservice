# Скопируйте в /etc/nginx/sites-available/pickupservice.moscow
# и включите: ln -s ... sites-enabled/
# Замените пути, если каталог проекта не /var/www/pickupservice

upstream pickupservice_django {
    server unix:/run/gunicorn/pickupservice.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name pickupservice.moscow www.pickupservice.moscow;

    # После certbot сюда добавятся редирект и блок listen 443 ssl;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pickupservice.moscow www.pickupservice.moscow;

    # Сертификаты Let's Encrypt (пути подставит certbot)
    ssl_certificate /etc/letsencrypt/live/pickupservice.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pickupservice.moscow/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    root /var/www/pickupservice/dist;
    index index.html;

    location /static/ {
        alias /var/www/pickupservice/server/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/pickupservice/server/media/;
        expires 7d;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://pickupservice_django;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://pickupservice_django;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
