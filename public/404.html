<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>404 — ПикапСервис-МСК</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020202;
        color: #ffffff;
        font-family: Inter, Arial, sans-serif;
      }
      .card {
        width: min(92vw, 620px);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.03);
      }
      h1 {
        margin: 0 0 14px;
        font-size: clamp(28px, 5vw, 44px);
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 22px;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.5;
      }
      a {
        display: inline-block;
        text-decoration: none;
        padding: 11px 18px;
        border-radius: 10px;
        background: #ff8201;
        color: #111111;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404 — страница не найдена</h1>
      <p>Такого адреса нет. Вернитесь на главную страницу сайта.</p>
      <a href="/">На главную</a>
    </main>
  </body>
</html>
